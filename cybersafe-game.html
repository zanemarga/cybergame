<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberSafe World</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family:'Segoe UI',sans-serif; background:#000; }
#start { position:fixed; inset:0; z-index:100; background:linear-gradient(135deg,#43b89c,#3a7bd5 50%,#8e44ad); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
.title { font-size:52px; font-weight:900; color:#fff; text-shadow:0 4px 24px rgba(0,0,0,.3); letter-spacing:-1px; }
.lang-row { display:flex; gap:10px; }
.lang-btn { padding:8px 22px; border-radius:30px; border:2px solid #fff; background:transparent; color:#fff; cursor:pointer; font-size:14px; font-weight:700; font-family:inherit; transition:all .2s; }
.lang-btn.active { background:#fff; color:#3a7bd5; }
#name-inp { padding:13px 22px; border-radius:30px; border:none; font-size:16px; width:300px; text-align:center; outline:none; font-family:inherit; }
.cards { display:flex; gap:18px; }
.card { background:rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.35); border-radius:22px; padding:28px 20px; width:165px; text-align:center; cursor:pointer; transition:all .22s; color:#fff; }
.card:hover { background:rgba(255,255,255,.28); transform:translateY(-6px); }
.card .icon { font-size:44px; margin-bottom:12px; }
.card .lbl { font-size:15px; font-weight:800; margin-bottom:4px; }
.card .dsc { font-size:11px; opacity:.8; line-height:1.4; }
.hint { font-size:12px; color:rgba(255,255,255,.6); }
#hud { position:fixed; top:0; left:0; right:0; z-index:50; display:none; align-items:center; justify-content:space-between; padding:14px 22px; background:linear-gradient(180deg,rgba(0,0,0,.45),transparent); color:#fff; }
#hud.show { display:flex; }
#hud-name { font-weight:800; font-size:17px; }
#hud-mode { background:rgba(255,255,255,.2); padding:5px 14px; border-radius:20px; font-size:12px; font-weight:600; }
#hud-lang { background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.4); border-radius:20px; padding:5px 14px; color:#fff; cursor:pointer; font-size:12px; font-family:inherit; font-weight:700; }
#hud-back { background:rgba(255,80,80,.25); border:1px solid rgba(255,120,120,.5); border-radius:20px; padding:5px 14px; color:#fff; cursor:pointer; font-size:12px; font-family:inherit; font-weight:700; }
#ctrl { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.5); color:#fff; padding:8px 18px; border-radius:20px; font-size:12px; display:none; pointer-events:none; }
#ctrl.show { display:block; }
</style>
</head>
<body>
<div id="start">
  <div class="title">🛡️ CyberSafe World</div>
  <div class="subtitle" id="s-sub" style="font-size:16px;color:rgba(255,255,255,.85)">Protect your world. Learn cybersecurity!</div>
  <div class="lang-row">
    <button class="lang-btn active" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('lv')">🇱🇻 Latviski</button>
  </div>
  <input id="name-inp" type="text" maxlength="20" placeholder="Enter your name…"/>
  <div class="cards">
    <div class="card" onclick="go('kids')"><div class="icon">🧒</div><div class="lbl" id="c1l">For Kids</div><div class="dsc" id="c1d">Ages 8–12</div></div>
    <div class="card" onclick="go('elderly')"><div class="icon">👴</div><div class="lbl" id="c2l">For Elderly</div><div class="dsc" id="c2d">Larger text, slower pace</div></div>
    <div class="card" onclick="go('beginner')"><div class="icon">🖥️</div><div class="lbl" id="c3l">For Beginners</div><div class="dsc" id="c3d">No experience needed</div></div>
  </div>
  <div class="hint" id="s-hint">Choose your mode to begin!</div>
</div>
<div id="hud">
  <div id="hud-name">👤 Hero</div>
  <div id="hud-mode">Kids Mode</div>
  <button id="hud-lang" onclick="toggleLang()">🇱🇻 Latviski</button>
  <button id="hud-back" onclick="goBack()">🚪 Menu</button>
</div>
<div id="ctrl"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── LANGUAGE ──────────────────────────────────────────────
const T = {
  en:{ sub:'Protect your world. Learn cybersecurity!', ph:'Enter your name…', c1l:'For Kids', c1d:'Ages 8–12', c2l:'For Elderly', c2d:'Larger text, slower pace', c3l:'For Beginners', c3d:'No experience needed', hint:'Choose your mode to begin!', modes:{kids:'🧒 Kids Mode',elderly:'👴 Elderly Mode',beginner:'🖥️ Beginner Mode'}, ctrl:'WASD / Arrows — move  •  Drag — rotate  •  Scroll — zoom', switchBtn:'🇱🇻 Latviski', defName:'Hero', back:'🚪 Menu' },
  lv:{ sub:'Aizsargi savu pasauli. Iemācies kiberdrošību!', ph:'Ievadi savu vārdu…', c1l:'Bērniem', c1d:'8–12 gadi', c2l:'Senioriem', c2d:'Lielāks teksts, lēnāks temps', c3l:'Iesācējiem', c3d:'Pieredze nav vajadzīga', hint:'Izvēlies režīmu, lai sāktu!', modes:{kids:'🧒 Bērnu režīms',elderly:'👴 Senioru režīms',beginner:'🖥️ Iesācēju režīms'}, ctrl:'WASD / Bulttaustiņi — kustība  •  Vilkt — rotēt  •  Ritināt — tuvināt', switchBtn:'🇬🇧 English', defName:'Varonis', back:'🚪 Izvēlne' }
};
let lang='en', mode='kids', pname='';

function setLang(l) {
  lang=l; const s=T[l];
  document.getElementById('s-sub').textContent=s.sub;
  document.getElementById('name-inp').placeholder=s.ph;
  document.getElementById('c1l').textContent=s.c1l; document.getElementById('c1d').textContent=s.c1d;
  document.getElementById('c2l').textContent=s.c2l; document.getElementById('c2d').textContent=s.c2d;
  document.getElementById('c3l').textContent=s.c3l; document.getElementById('c3d').textContent=s.c3d;
  document.getElementById('s-hint').textContent=s.hint;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='en')||(i===1&&l==='lv')));
  document.getElementById('ctrl').textContent=s.ctrl;
  document.getElementById('hud-lang').textContent=s.switchBtn;
  document.getElementById('hud-back').textContent=s.back;
  updateHUD();
}
function toggleLang(){ setLang(lang==='en'?'lv':'en'); }
function updateHUD(){
  const s=T[lang];
  document.getElementById('hud-name').textContent='👤 '+(pname||s.defName);
  document.getElementById('hud-mode').textContent=s.modes[mode];
  document.getElementById('hud-lang').textContent=s.switchBtn;
  document.getElementById('hud-back').textContent=s.back;
}
function goBack(){
  document.getElementById('hud').classList.remove('show');
  document.getElementById('ctrl').classList.remove('show');
  const c=document.querySelector('canvas'); if(c) c.remove();
  document.getElementById('start').style.display='flex';
}
function go(m){
  mode=m; pname=document.getElementById('name-inp').value.trim()||T[lang].defName;
  document.getElementById('start').style.display='none';
  document.getElementById('hud').classList.add('show');
  document.getElementById('ctrl').classList.add('show');
  document.getElementById('ctrl').textContent=T[lang].ctrl;
  updateHUD(); initGame();
}

// ── GAME ──────────────────────────────────────────────────
function initGame(){
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x9ab8d4);
  scene.fog=new THREE.Fog(0x9ab8d4,55,120);

  const cam=new THREE.PerspectiveCamera(65,window.innerWidth/window.innerHeight,0.1,200);
  cam.position.set(0,8,12);

  // Lights
  const sun=new THREE.DirectionalLight(0xfff5e0,1.4);
  sun.position.set(50,80,30);
  sun.castShadow=true;
  sun.shadow.mapSize.width=2048; sun.shadow.mapSize.height=2048;
  sun.shadow.camera.left=-70; sun.shadow.camera.right=70;
  sun.shadow.camera.top=70;  sun.shadow.camera.bottom=-70;
  sun.shadow.camera.far=200;
  sun.shadow.bias=-0.001;
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0xfff0e0,0.6));
  scene.add(new THREE.HemisphereLight(0x87ceeb,0x5a9e30,0.55));

  // Material helper
  function mat(color, shininess, specular){
    return new THREE.MeshPhongMaterial({color:color, shininess:shininess||10, specular:specular||0x222222});
  }

  // Mesh helpers — all add to scene and return mesh
  function mkBox(w,h,d,m, x,y,z, ry){
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
    mesh.position.set(x,y,z);
    if(ry) mesh.rotation.y=ry;
    mesh.castShadow=true; mesh.receiveShadow=true;
    scene.add(mesh); return mesh;
  }
  function mkCyl(rt,rb,h,seg,m, x,y,z){
    const mesh=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),m);
    mesh.position.set(x,y,z);
    mesh.castShadow=true; mesh.receiveShadow=true;
    scene.add(mesh); return mesh;
  }
  function mkSph(r,seg,m, x,y,z){
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg),m);
    mesh.position.set(x,y,z);
    mesh.castShadow=true;
    scene.add(mesh); return mesh;
  }
  function mkPlane(w,d,m, x,z, y){
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(w,d),m);
    mesh.rotation.x=-Math.PI/2;
    mesh.position.set(x, y||0.01, z);
    mesh.receiveShadow=true;
    scene.add(mesh); return mesh;
  }

  // ── GROUND ──
  mkPlane(200,200,mat(0x7a9e5c,3), 0,0);
  for(let i=0;i<40;i++){
    const gp=new THREE.Mesh(new THREE.PlaneGeometry(3+Math.random()*5,3+Math.random()*4),mat(0x6b8f4e,3));
    gp.rotation.x=-Math.PI/2; gp.rotation.z=Math.random()*Math.PI;
    gp.position.set((Math.random()-.5)*140, 0.005, (Math.random()-.5)*140);
    gp.receiveShadow=true; scene.add(gp);
  }

  // ── ROADS ──
  function road(x,z,w,d){
    mkBox(w,0.12,d,new THREE.MeshBasicMaterial({color:0x444444}), x,0.06,z);
    const curbM=mat(0xccccbb,5);
    if(w>d){
      mkBox(w,0.12,0.5,curbM, x,0.06,z+d/2+0.25);
      mkBox(w,0.12,0.5,curbM, x,0.06,z-d/2-0.25);
    } else {
      mkBox(0.5,0.12,d,curbM, x+w/2+0.25,0.06,z);
      mkBox(0.5,0.12,d,curbM, x-w/2-0.25,0.06,z);
    }
    // White edge lines (solid)
    const lineM=new THREE.MeshBasicMaterial({color:0xffffff});
    if(w>d){
      mkBox(w,0.13,0.2,lineM, x,0.065,z+d/2-0.15);
      mkBox(w,0.13,0.2,lineM, x,0.065,z-d/2+0.15);
    } else {
      mkBox(0.2,0.13,d,lineM, x+w/2-0.15,0.065,z);
      mkBox(0.2,0.13,d,lineM, x-w/2+0.15,0.065,z);
    }
    // Dashed center line
    const dw=w>d, len=Math.max(w,d), n=Math.floor(len/5);
    for(let i=0;i<n;i++){
      const dash=new THREE.Mesh(new THREE.BoxGeometry(dw?2.5:0.2, 0.13, dw?0.2:2.5),lineM);
      dash.position.set(dw?x-len/2+i*5+1.5:x, 0.065, dw?z:z-len/2+i*5+1.5);
      scene.add(dash);
    }
  }
  road(0,0,7,130); road(0,0,130,7);

  const swM=mat(0xd0cfbe,5);
  mkBox(2.6,0.1,130,swM,  5.8,0.04,0);
  mkBox(2.6,0.1,130,swM, -5.8,0.04,0);
  mkBox(130,0.1,2.6,swM,  0,0.04, 5.8);
  mkBox(130,0.1,2.6,swM,  0,0.04,-5.8);

  // ── BUILDINGS ──
  function building(x,z,w,h,d,wallCol,roofCol,trimCol,winCol){
    trimCol=trimCol||0xffffff; winCol=winCol||0xd0e8ff;
    // Wall
    mkBox(w,h,d,mat(wallCol,15,0x444444), x,h/2,z);
    // Roof
    mkBox(w+0.8,0.5,d+0.8,mat(roofCol,20,0x555555), x,h+0.25,z);
    // Foundation
    mkBox(w+0.3,0.35,d+0.3,mat(0xaaaaaa,5), x,0.17,z);
    // Trim bands
    mkBox(w+0.1,0.28,d+0.1,mat(trimCol,8), x,h*0.35,z);
    mkBox(w+0.1,0.28,d+0.1,mat(trimCol,8), x,h*0.7,z);
    // Windows
    const glassM=new THREE.MeshPhongMaterial({color:winCol,shininess:120,specular:0xffffff,transparent:true,opacity:0.85});
    const frameM=mat(trimCol,10);
    const cols=Math.max(1,Math.floor(w/2.4)), rows=Math.max(1,Math.floor(h/2.6));
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const wx=x+(c-(cols-1)/2)*2.3, wy=1.4+r*2.5;
      mkBox(1.05,1.3,0.1,frameM, wx,wy,z+d/2+0.01);
      const gl=new THREE.Mesh(new THREE.PlaneGeometry(0.82,1.05),glassM);
      gl.position.set(wx,wy,z+d/2+0.07); scene.add(gl);
    }
    // Door
    mkBox(1.2,2.1,0.12,mat(trimCol,10), x,1.05,z+d/2+0.01);
    mkBox(0.95,1.85,0.05,mat(0x7a5030,20,0x996633), x,1.05,z+d/2+0.08);
    mkSph(0.07,6,mat(0xddaa00,80,0xffee88), x+0.32,1.05,z+d/2+0.13);
  }

  building(-20,-20,15,7,10, 0xd4aa3a,0xb08820,0xf0e8cc,0xfff9cc);   // school - muted gold
  building( 18,-16, 9,18, 8, 0x5a7fa8,0x3a5878,0xd0e0ee,0xc0d8ee);  // office - steel blue
  building(-20, 18,13, 5,10, 0xe0dbd0,0xc4bfb4,0xf0ece4,0xd8e8ee);  // bank - warm stone
  building( 18, 18, 8, 4, 7, 0xc47850,0xa05830,0xeebb99);            // cafe - terracotta
  building(-20,  2, 8, 6, 8, 0x6a9e70,0x4a7850,0xb8d4b8);           // library - sage green
  building( 18,  2, 8, 6, 8, 0x4a6090,0x2e4068,0xaabbd0,0xf0f4ff);  // police - slate blue
  building(-10, 28, 6, 4, 6, 0xc47890,0x9a5070,0xeeccdd);            // house - dusty rose
  building(  0, 28, 6, 4, 6, 0xc8904a,0xa06828,0xeeddb8);            // house - warm tan
  building( 10, 28, 6, 4, 6, 0x8878c0,0x605098,0xd4cce8);            // house - muted purple
  building(-10,-28, 6, 4, 6, 0x60a878,0x407858,0xb8ddc8);            // house - soft teal
  building( 10,-28, 6, 4, 6, 0xc06880,0x984860,0xeebbc8);            // house - muted pink

  // ── CLOUDS ──
  const clouds=[];
  const cloudPositions=[[-40,35,-30,1.4],[30,42,-50,1.1],[60,38,20,1.6],[-70,44,10,1.0],[15,36,-70,1.3],[-20,40,60,1.2],[50,33,50,0.9],[-55,41,-15,1.5]];
  cloudPositions.forEach(function(cp){
    const cx=cp[0],cy=cp[1],cz=cp[2],sc=cp[3];
    const g=new THREE.Group();
    const cm=new THREE.MeshPhongMaterial({color:0xffffff,shininess:5,transparent:true,opacity:0.9});
    const offsets=[[0,0,0,2.2],[2.2,0.5,0,1.7],[-2.2,0.3,0,1.5],[0.8,1.2,0,1.4],[-0.8,1.0,0.5,1.2],[1.5,-0.3,0.8,1.3]];
    offsets.forEach(function(o){
      const s=new THREE.Mesh(new THREE.SphereGeometry(o[3],8,6),cm);
      s.position.set(o[0],o[1],o[2]);
      g.add(s);
    });
    g.position.set(cx,cy,cz);
    g.scale.setScalar(sc);
    scene.add(g);
    clouds.push(g);
  });

  // ── TREES ──
  function tree(x,z,h,cr){
    h=h||4.2; cr=cr||1.5;
    const tM=mat(0x8b5e3c,10,0x664422);
    mkCyl(h*0.04,h*0.07,h*0.38,8,tM, x,h*0.19,z);
    const greens=[0x2d6e2d,0x3a8c3a,0x4aaa4a,0x5fb840];
    const layers=[[h*0.55,cr],[h*0.72,cr*0.78],[h*0.87,cr*0.58],[h*1.0,cr*0.38]];
    layers.forEach(function(l,i){
      const lm=mat(greens[i],5,0x224422);
      const s=new THREE.Mesh(new THREE.SphereGeometry(l[1],9,7),lm);
      s.position.set(x+(Math.random()-.5)*0.3, l[0], z+(Math.random()-.5)*0.3);
      s.castShadow=true; scene.add(s);
    });
  }
  [[-13,-13],[-13,13],[13,-13],[13,13],[-4,-32],[4,-32],[-4,32],[4,32],[-30,-15],[30,-15],[-30,15],[30,15],[-16,0],[16,0],[-3,-15],[3,-15],[3,15],[-3,15],[-35,-35],[35,-35],[-35,35],[35,35]].forEach(function(p){ tree(p[0],p[1],3.5+Math.random()*2,1.3+Math.random()*0.6); });

  // ── FLOWERS ──
  var fCols=[0xff3366,0xffcc00,0xff6600,0xcc44ff,0xff99aa,0xffffff];
  function flowers(cx,cz,n){
    for(var i=0;i<n;i++){
      var x=cx+(Math.random()-.5)*4, fz=cz+(Math.random()-.5)*4;
      mkCyl(0.03,0.03,0.4,5,mat(0x44aa44,3), x,0.2,fz);
      var pm=mat(fCols[Math.floor(Math.random()*fCols.length)],10);
      var pet=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,5),pm);
      pet.position.set(x,0.45,fz); pet.scale.y=0.5; scene.add(pet);
    }
  }
  [[-30,-30],[-30,30],[30,-30],[30,30],[-15,20],[15,-20]].forEach(function(p){ flowers(p[0],p[1],8); });

  // ── INTERSECTION (center) — plain tarmac ──
  mkBox(14,0.12,14,new THREE.MeshBasicMaterial({color:0x444444}), 0,0.07,0);
  // Cross walk stripes N/S
  const cwM=new THREE.MeshBasicMaterial({color:0xffffff});
  for(var i=0;i<5;i++){
    mkBox(0.7,0.13,3.5,cwM, -3.5+i*1.6, 0.065, -8.5);
    mkBox(0.7,0.13,3.5,cwM, -3.5+i*1.6, 0.065,  8.5);
  }
  // Cross walk stripes E/W
  for(var i=0;i<5;i++){
    mkBox(3.5,0.13,0.7,cwM, -8.5, 0.065, -3.5+i*1.6);
    mkBox(3.5,0.13,0.7,cwM,  8.5, 0.065, -3.5+i*1.6);
  }

  // ── LAMP POSTS ──
  function lamp(x,z){
    const mM=mat(0x445566,40,0x778899);
    mkCyl(0.07,0.1,5,8,mM, x,2.5,z);
    mkBox(0.4,0.25,0.4,mM, x,0.12,z);
    // Arm
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1.4,6),mM);
    arm.rotation.z=Math.PI/2; arm.position.set(x+0.7,5.0,z); scene.add(arm);
    const hood=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.18,0.3,8),mM);
    hood.position.set(x+1.4,4.88,z); scene.add(hood);
    const bulbM=new THREE.MeshPhongMaterial({color:0xfffde0,emissive:new THREE.Color(0xffee88),shininess:100});
    mkSph(0.16,8,bulbM, x+1.4,4.78,z);
    const pl=new THREE.PointLight(0xffe8a0,0.6,12);
    pl.position.set(x+1.4,4.8,z); scene.add(pl);
  }
  [[-8,-8],[-8,8],[8,-8],[8,8],[-8,-22],[8,-22],[-8,22],[8,22],[22,-8],[22,8],[-22,-8],[-22,8]].forEach(function(p){ lamp(p[0],p[1]); });

  // ── ROAD SIGNS ──
  function roadSign(x,z,col){
    mkCyl(0.05,0.06,2.0,6,mat(0x888888,30), x,1.0,z);
    mkBox(1.0,0.6,0.08,mat(col,20,0xffffff), x,2.1,z);
    mkBox(1.1,0.7,0.05,mat(0xffffff,10), x,2.1,z-0.05);
  }
  roadSign(-7.5,-7.5,0xffcc00); roadSign(7.5,-7.5,0x44aa44);
  roadSign(-7.5,7.5,0xff4444);  roadSign(7.5,7.5,0x4488ff);

  // ── PLAYER ──
  const skM=mat(0xffcc88,15,0xffaa66), hrM=mat(0x3d2200,5), shM=mat(0x3a7bd5,20,0x6699ee);
  const ptM=mat(0x2a3f6a,10), soM=mat(0x222222,30,0x444444);
  const eyM=mat(0x1a1a2e,5), wtM=mat(0xffffff,30,0xffffff), moM=mat(0xcc4444,5);

  const player=new THREE.Group();

  // Torso
  const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,0.75,8),shM);
  torso.position.y=1.12; torso.castShadow=true; player.add(torso);
  // Shoulders
  [-0.36,0.36].forEach(function(sx){ const s=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,6),shM); s.position.set(sx,1.42,0); player.add(s); });
  // Neck
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.11,0.2,8),skM); neck.position.y=1.58; player.add(neck);
  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.27,14,10),skM); head.position.y=1.86; head.castShadow=true; player.add(head);
  head.scale.set(1,1.05,0.94);
  // Hair
  const hair=new THREE.Mesh(new THREE.SphereGeometry(0.285,12,8),hrM); hair.position.set(0,2.0,0); hair.scale.set(1,0.58,0.96); player.add(hair);
  [-1,1].forEach(function(sx){ const sh=new THREE.Mesh(new THREE.SphereGeometry(0.16,7,6),hrM); sh.position.set(sx*0.26,1.88,-0.02); sh.scale.z=0.5; player.add(sh); });
  // Eyes
  [[-.1,1.88,.25],[.1,1.88,.25]].forEach(function(p){
    const e=new THREE.Mesh(new THREE.SphereGeometry(0.052,7,7),wtM); e.position.set(p[0],p[1],p[2]); player.add(e);
    const pu=new THREE.Mesh(new THREE.SphereGeometry(0.032,6,6),eyM); pu.position.set(p[0],p[1],p[2]+0.03); player.add(pu);
    const br=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.025,0.04),hrM); br.position.set(p[0],p[1]+0.09,p[2]); player.add(br);
  });
  const nose=new THREE.Mesh(new THREE.SphereGeometry(0.03,5,5),skM); nose.position.set(0,1.83,0.28); player.add(nose);
  const smile=new THREE.Mesh(new THREE.TorusGeometry(0.065,0.016,5,8,Math.PI),moM); smile.position.set(0,1.77,0.27); smile.rotation.z=Math.PI; player.add(smile);
  // Arms
  const armLG=new THREE.Group(); armLG.position.set(-0.38,1.38,0); player.add(armLG);
  const armRG=new THREE.Group(); armRG.position.set( 0.38,1.38,0); player.add(armRG);
  [armLG,armRG].forEach(function(g){
    const u=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.09,0.46,8),shM); u.position.y=-0.23; g.add(u);
    const el=new THREE.Mesh(new THREE.SphereGeometry(0.09,7,6),shM); el.position.y=-0.48; g.add(el);
    const l=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.07,0.42,8),skM); l.position.y=-0.7; g.add(l);
    const h=new THREE.Mesh(new THREE.SphereGeometry(0.1,8,7),skM); h.position.y=-0.95; h.scale.y=0.8; g.add(h);
  });
  // Hips
  const hips=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.26,0.22,8),ptM); hips.position.y=0.72; player.add(hips);
  // Legs
  const legLG=new THREE.Group(); legLG.position.set(-0.14,0.65,0); player.add(legLG);
  const legRG=new THREE.Group(); legRG.position.set( 0.14,0.65,0); player.add(legRG);
  [legLG,legRG].forEach(function(g){
    const u=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.11,0.5,8),ptM); u.position.y=-0.25; g.add(u);
    const kn=new THREE.Mesh(new THREE.SphereGeometry(0.1,7,6),ptM); kn.position.y=-0.52; g.add(kn);
    const l=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.08,0.46,8),ptM); l.position.y=-0.76; g.add(l);
    const f=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.13,0.38),soM); f.position.set(0.02,-1.02,0.06); g.add(f);
  });
  // Spawn point marker
  const spawnM=new THREE.MeshBasicMaterial({color:0x44dd88, transparent:true, opacity:0.6});
  const spawnRing=new THREE.Mesh(new THREE.RingGeometry(0.6,1.0,24),spawnM);
  spawnRing.rotation.x=-Math.PI/2; spawnRing.position.set(10,0.13,10); scene.add(spawnRing);
  const spawnInner=new THREE.Mesh(new THREE.CircleGeometry(0.6,24),new THREE.MeshBasicMaterial({color:0x88ffbb,transparent:true,opacity:0.35}));
  spawnInner.rotation.x=-Math.PI/2; spawnInner.position.set(10,0.13,10); scene.add(spawnInner);

  scene.add(player);
  player.position.set(10,0,10);

  // ── INPUT ──
  const keys={};
  window.addEventListener('keydown',function(e){ keys[e.code]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
  window.addEventListener('keyup',function(e){ keys[e.code]=false; });

  let camYaw=0, camPitch=0.44, camDist=9, dragging=false, lastX=0, lastY=0;
  window.addEventListener('wheel',function(e){ camDist=Math.max(3,Math.min(30,camDist+e.deltaY*0.02)); });
  renderer.domElement.addEventListener('mousedown',function(e){ dragging=true; lastX=e.clientX; lastY=e.clientY; });
  window.addEventListener('mouseup',function(){ dragging=false; });
  window.addEventListener('mousemove',function(e){
    if(!dragging) return;
    camYaw-=(e.clientX-lastX)*0.007;
    camPitch=Math.max(0.1,Math.min(1.3,camPitch+(e.clientY-lastY)*0.005));
    lastX=e.clientX; lastY=e.clientY;
  });
  let ltx=0,lty=0;
  renderer.domElement.addEventListener('touchstart',function(e){ ltx=e.touches[0].clientX; lty=e.touches[0].clientY; });
  renderer.domElement.addEventListener('touchmove',function(e){ camYaw-=(e.touches[0].clientX-ltx)*0.007; camPitch=Math.max(0.1,Math.min(1.3,camPitch+(e.touches[0].clientY-lty)*0.005)); ltx=e.touches[0].clientX; lty=e.touches[0].clientY; });

  // ── ANIMATE ──
  const spds={kids:0.12,elderly:0.07,beginner:0.09};
  const target=new THREE.Vector3();
  let t=0;

  function animate(){
    requestAnimationFrame(animate);
    t+=0.016;
    const spd=spds[mode];
    const fwd=new THREE.Vector3(Math.sin(camYaw),0,Math.cos(camYaw));
    const right=new THREE.Vector3(Math.cos(camYaw),0,-Math.sin(camYaw));
    const move=new THREE.Vector3();
    if(keys['ArrowUp']  ||keys['KeyW']) move.sub(fwd);
    if(keys['ArrowDown'] ||keys['KeyS']) move.add(fwd);
    if(keys['ArrowLeft'] ||keys['KeyA']) move.sub(right);
    if(keys['ArrowRight']||keys['KeyD']) move.add(right);
    const moving=move.lengthSq()>0;
    if(moving){
      move.normalize().multiplyScalar(spd);
      player.position.add(move);
      player.position.x=Math.max(-65,Math.min(65,player.position.x));
      player.position.z=Math.max(-65,Math.min(65,player.position.z));
      player.rotation.y=Math.atan2(move.x,move.z);
      const w=Math.sin(t*18)*0.6;
      legLG.rotation.x=w; legRG.rotation.x=-w;
      armLG.rotation.x=-w*0.65; armRG.rotation.x=w*0.65;
      player.position.y=Math.abs(Math.sin(t*18))*0.045;
    } else {
      legLG.rotation.x=legRG.rotation.x=armLG.rotation.x=armRG.rotation.x=0;
      player.position.y=Math.sin(t*1.8)*0.02;
    }
    // Drift clouds
    clouds.forEach(function(c,i){ c.position.x+=0.008*(i%2===0?1:-0.8); if(c.position.x>130) c.position.x=-130; else if(c.position.x<-130) c.position.x=130; });

    const cx=player.position.x+Math.sin(camYaw)*camDist*Math.cos(camPitch);
    const cz=player.position.z+Math.cos(camYaw)*camDist*Math.cos(camPitch);
    const cy=player.position.y+camDist*Math.sin(camPitch);
    target.set(cx,cy,cz);
    cam.position.lerp(target,0.1);
    cam.lookAt(player.position.x,player.position.y+1.2,player.position.z);
    renderer.render(scene,cam);
  }
  animate();

  window.addEventListener('resize',function(){
    cam.aspect=window.innerWidth/window.innerHeight;
    cam.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}
</script>
</body>
</html>
